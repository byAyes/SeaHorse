name: Seahorse - Pipeline Principal

on:
  schedule:
    # Weekly: Thursday at 9:00 AM UTC
    - cron: '0 9 * * 4'
  workflow_dispatch:
    inputs:
      run-cv-processing:
        description: 'Run CV processing pipeline (requires PostgreSQL)'
        type: boolean
        default: false
      run-cleanup:
        description: 'Run cleanup after automation'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'cvs/**/*.pdf'
      - 'scrapers/**'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'scrapers.yaml'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ──────────────────────────────────────────────
  # MAIN AUTOMATION PIPELINE
  # ──────────────────────────────────────────────
  automation:
    name: Job Email Automation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Email
      EMAIL_PROVIDER: resend
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_ACCESS_TOKEN: ${{ secrets.GMAIL_ACCESS_TOKEN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      # Job Search
      JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}

      # AI Matching
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Database
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'scrapers/requirements.txt'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run automation pipeline
        run: npm run automate

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
          retention-days: 30

  # ──────────────────────────────────────────────
  # CV PROCESSING (optional, requires PostgreSQL)
  # Pipeline independiente: procesa CVs → actualiza perfiles → scrapea → matchea → email
  # Se ejecuta solo cuando se solicita explícitamente o en push con CVs nuevos
  # ──────────────────────────────────────────────
  process-cv:
    if: ${{ inputs.run-cv-processing == true || github.event_name == 'push' }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_automation
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_automation
      NODE_ENV: production
      JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npx prisma generate

      - name: Push database schema
        run: npx prisma db push --accept-data-loss

      - name: Process latest CV uploads
        run: npx tsx scripts/process-cv-uploads.ts

      - name: Auto-update profiles from CVs
        run: npx tsx scripts/auto-update-profiles.ts

      - name: Run job scraping with updated profiles
        run: npx tsx scripts/scrape-jobs.ts

      - name: Match jobs to updated profiles
        run: npx tsx scripts/match-jobs.ts

      - name: Send email digests
        run: npx tsx scripts/send-email-digest.ts
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}

  # ──────────────────────────────────────────────
  # CLEANUP (optional)
  # ──────────────────────────────────────────────
  cleanup:
    if: ${{ always() }}
    needs: [automation, process-cv]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npx prisma generate

      - name: Cleanup old CV files
        run: |
          echo "Cleaning up old CV versions..."
          npx tsx scripts/cleanup-old-cvs.ts || echo "Cleanup skipped or completed"
